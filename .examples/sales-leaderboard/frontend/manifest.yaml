name: example-sales-frontend
type: service
image:
  type: build
  build_source:
    type: local
    local_path: .
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: .
ports:
  - port: 80
    protocol: TCP
    expose: true
    app_protocol: http
env:
  BACKEND_URL: "${BACKEND_URL}"
resources:
  cpu_request: 0.1
  cpu_limit: 0.25
  memory_request: 64
  memory_limit: 128
replicas: 1
workspace_fqn: ${TFY_WORKSPACE_FQN}
