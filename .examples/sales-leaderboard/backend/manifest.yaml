name: example-sales-backend
type: service
image:
  type: build
  build_source:
    type: local
    local_path: .
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: .
ports:
  - port: 8000
    protocol: TCP
    expose: true
    app_protocol: http
env:
  REDIS_HOST: "${REDIS_HOST}"
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
  REDIS_PORT: "6379"
resources:
  cpu_request: 0.2
  cpu_limit: 0.5
  memory_request: 256
  memory_limit: 512
replicas: 1
workspace_fqn: ${TFY_WORKSPACE_FQN}
